name: Update stock data

on:
  schedule:
    # Run every 5 minutes for GitHub Actions schedule testing.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stock-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch stock data
        run: python scripts/fetch_stock.py

      - name: Commit and push latest data
        run: |
          if git diff --quiet -- public/data/latest.json; then
            echo "No stock data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/latest.json
          git commit -m "chore: update stock data"
          git push
