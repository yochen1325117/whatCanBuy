name: Update stock data

on:
  schedule:
    - cron: "30 9 * * 1-5"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch stock data
        run: python scripts/fetch_stock.py

      - name: Commit and push latest data
        id: commit-data
        run: |
          if git diff --quiet -- public/data/latest.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No stock data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/latest.json
          git commit -m "chore: update stock data"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger GitHub Pages deploy
        if: steps.commit-data.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref main
